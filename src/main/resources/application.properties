# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Show SQL and let Hibernate create/update tables automatically in dev
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Enable H2 console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# let Hibernate create/update tables first, then run data.sql
spring.jpa.defer-datasource-initialization=true

# Optional: ensure Spring's SQL initializer runs
spring.sql.init.mode=always